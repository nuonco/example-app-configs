<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Example Apps | Nuon</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  
  <!-- Open Graph -->
  <meta property="og:title" content="Example Apps | Nuon">
  <meta property="og:description" content="Explore example applications that can be deployed into customer cloud accounts with Nuon.">
  <meta property="og:image" content="https://nuonco.github.io/example-app-configs/og-preview.png">
  <meta property="og:url" content="https://nuonco.github.io/example-app-configs/">
  <meta property="og:type" content="website">
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Example Apps | Nuon">
  <meta name="twitter:description" content="Explore example applications that can be deployed into customer cloud accounts with Nuon.">
  <meta name="twitter:image" content="https://nuonco.github.io/example-app-configs/og-preview.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          borderRadius: {
            lg: '0.75rem',
            md: 'calc(0.75rem - 2px)',
            sm: 'calc(0.75rem - 4px)',
          },
          colors: {
            background: '#0d0d0d',
            foreground: '#ededed',
            card: { DEFAULT: '#141414', foreground: '#ededed' },
            border: '#262626',
            input: '#262626',
            muted: { DEFAULT: '#1c1c1c', foreground: '#8c8c8c' },
            accent: { DEFAULT: '#1c1c1c', foreground: '#e0e0e0' },
            primary: { DEFAULT: '#4a9eff', foreground: '#050505' },
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    *, *::before, *::after {
      transition: background-color 0.35s ease, border-color 0.35s ease, color 0.2s ease, box-shadow 0.35s ease;
    }
    body { background: #0d0d0d; }
    .gradient-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(74,158,255,0.3), rgba(99,102,241,0.2), transparent);
    }
    .dd-menu { animation: dd-in 120ms ease-out; }
    @keyframes dd-in { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="min-h-screen font-sans text-foreground antialiased">
  <div x-data="demoApp()" x-init="init()" class="max-w-6xl mx-auto px-6 py-12">
    
    <!-- Header -->
    <header class="mb-12">
      <div class="flex items-center gap-3 mb-6">
        <a href="https://nuon.co" class="hover:opacity-80">
          <svg class="h-7 w-7" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="nuon-gradient" gradientUnits="userSpaceOnUse" x1="359.74" y1="979.23" x2="717.77" y2="104.97">
                <stop offset="0" style="stop-color:#F72585"/>
                <stop offset="0.53" style="stop-color:#3A00FF"/>
                <stop offset="1" style="stop-color:#4CC9F0"/>
              </linearGradient>
            </defs>
            <path fill="url(#nuon-gradient)" d="M704.25,72.41L519.57,175.78v167.36l-149.5-83.72h-0.09l-178.2,99.74v548.81l178.12,99.74h0.09l191.24-107.09V740.61l143.02,80.01l184.68-103.37V175.78L704.25,72.41z M233.52,382.52l136.38-76.29h0.09l149.5,83.64v280.64L233.52,510.5V382.52z M519.48,877.25L369.9,960.89L233.52,884.6V557.23l285.96,160.01V877.25z M847.19,693.79L704.25,773.8l-142.94-79.92V413.24l285.96,160.01v120.54H847.19z M847.19,526.52L561.22,366.51V199.15l143.02-80.01l142.94,80.01V526.52z"/>
          </svg>
        </a>
        <span class="text-border">/</span>
        <span class="text-foreground font-medium">Example Apps</span>
      </div>
      <h1 class="text-4xl md:text-5xl font-semibold text-foreground mb-4 tracking-tight">
        Example Apps
      </h1>
      <p class="text-lg text-muted-foreground max-w-2xl leading-relaxed">
        Explore example applications that can be deployed into customer cloud accounts with 
        <a href="https://nuon.co" class="text-primary hover:underline">Nuon</a>.
        These demos are designed for learning — not production.
      </p>
      <div class="gradient-line mt-8"></div>
    </header>

    <!-- Search & Filters -->
    <div class="mb-10 space-y-3">
      <!-- Search -->
      <div class="relative">
        <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-muted-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input 
          type="text" 
          x-model="search" 
          placeholder="Search demos..."
          class="w-full pl-12 pr-4 py-3.5 bg-card border border-border rounded-lg text-foreground placeholder-muted-foreground focus:outline-none focus:border-primary/40 focus:ring-1 focus:ring-primary/40"
        >
      </div>

      <!-- Dropdown filter bar -->
      <div class="flex flex-wrap gap-2 items-center">
        <template x-for="dd in dropdowns" :key="dd.key">
          <div class="relative" @click.outside="openDd = openDd === dd.key ? '' : openDd">
            <button
              @click="openDd = openDd === dd.key ? '' : dd.key"
              class="flex items-center gap-1.5 px-3 py-2 bg-card border border-border rounded-lg text-sm cursor-pointer select-none hover:bg-muted/50"
              :class="f[dd.key] ? 'border-primary/40 text-primary' : 'text-muted-foreground'"
            >
              <span x-text="f[dd.key] ? filterLabel(dd.key, f[dd.key]) : dd.label"></span>
              <svg class="w-3.5 h-3.5 opacity-50" :class="openDd === dd.key && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="transition:transform 150ms ease"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </button>
            <div
              x-show="openDd === dd.key"
              x-cloak
              class="dd-menu absolute z-50 mt-1 left-0 min-w-[160px] py-1 bg-card border border-border rounded-lg shadow-xl shadow-black/50"
            >
              <button
                @click="f[dd.key] = ''; openDd = ''"
                class="w-full text-left px-3 py-1.5 text-sm flex items-center gap-2 hover:bg-muted/50"
                :class="!f[dd.key] ? 'text-primary' : 'text-muted-foreground'"
              >
                <svg class="w-3.5 h-3.5" :class="!f[dd.key] ? 'opacity-100' : 'opacity-0'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
                All
              </button>
              <template x-for="opt in dd.options" :key="opt">
                <button
                  @click="f[dd.key] = f[dd.key] === opt ? '' : opt; openDd = ''"
                  class="w-full text-left px-3 py-1.5 text-sm flex items-center gap-2 hover:bg-muted/50"
                  :class="f[dd.key] === opt ? 'text-primary' : 'text-muted-foreground'"
                >
                  <svg class="w-3.5 h-3.5" :class="f[dd.key] === opt ? 'opacity-100' : 'opacity-0'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
                  <span x-text="filterLabel(dd.key, opt)"></span>
                </button>
              </template>
            </div>
          </div>
        </template>

        <button
          x-show="hasActiveFilters" x-cloak
          @click="clearAll()"
          class="px-3 py-2 text-sm text-muted-foreground hover:text-foreground cursor-pointer"
        >Clear all</button>
      </div>

      <!-- Active filter chips -->
      <div class="flex flex-wrap items-center gap-2" x-show="hasActiveFilters" x-cloak>
        <span class="text-sm text-muted-foreground">
          <span class="text-foreground font-medium" x-text="filteredDemos.length"></span> of <span x-text="demos.length"></span> demos
        </span>
        <template x-for="chip in activeChips" :key="chip.key">
          <span class="inline-flex items-center gap-1 px-2.5 py-1 bg-primary/10 border border-primary/30 rounded-full text-xs text-primary">
            <span x-text="chip.label"></span>
            <button @click="f[chip.key] = ''" class="hover:text-foreground cursor-pointer">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </span>
        </template>
      </div>
    </div>

    <!-- Demo Grid -->
    <div x-cloak class="grid gap-3 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3">
      <template x-for="demo in filteredDemos" :key="demo.name">
        <a :href="demo.github" target="_blank"
          class="text-left bg-card hover:bg-muted/30 border border-border rounded-xl px-5 py-5 h-[172px] flex flex-col justify-between group">
          <div>
            <div class="flex items-start justify-between gap-3 mb-2">
              <h2 class="text-foreground text-sm font-medium group-hover:text-primary leading-snug" x-text="demo.title"></h2>
              <div class="shrink-0">
                <img x-show="demo.cloud === 'aws'" src="aws.svg" class="h-5 w-5" alt="AWS">
                <img x-show="demo.cloud === 'gcp'" src="google.svg" class="h-5 w-5" alt="GCP">
                <img x-show="demo.cloud === 'azure'" src="azure.svg" class="h-5 w-5" alt="Azure">
              </div>
            </div>
            <p class="text-muted-foreground text-[13px] line-clamp-2 leading-relaxed" x-text="demo.description"></p>
          </div>
          <div class="flex items-end justify-between gap-2">
            <div class="flex flex-wrap gap-1.5">
              <template x-for="s in demo.stack" :key="s">
                <span class="px-2 py-0.5 bg-muted border border-border text-muted-foreground text-[11px] rounded-md"
                  x-text="labels.stack[s] || s"></span>
              </template>
              <template x-for="feat in demo.features" :key="feat">
                <span class="px-2 py-0.5 bg-primary/10 border border-primary/20 text-primary text-[11px] rounded-md"
                  x-text="labels.feature[feat] || feat"></span>
              </template>
            </div>
            <svg class="w-4 h-4 shrink-0 text-muted-foreground group-hover:text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.5 19.5l15-15m0 0H8.25m11.25 0v11.25"/></svg>
          </div>
        </a>
      </template>
    </div>

    <!-- Empty state -->
    <div x-show="filteredDemos.length === 0" x-cloak class="text-center py-16">
      <div class="text-muted-foreground">
        <svg class="w-12 h-12 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <p class="text-lg mb-1">No demos match your filters.</p>
        <button @click="clearAll()" class="text-primary hover:underline text-sm">Clear all filters</button>
      </div>
    </div>

    <!-- Footer -->
    <footer class="mt-16 pt-8 border-t border-border">
      <div class="flex flex-col md:flex-row justify-between items-center gap-4 text-sm text-muted-foreground">
        <div class="flex items-center gap-6">
          <a href="https://docs.nuon.co" class="hover:text-foreground">Docs</a>
          <a href="https://github.com/nuonco/example-app-configs" class="hover:text-foreground">GitHub</a>
          <a href="https://github.com/nuonco/nuon" class="hover:text-foreground">Open Source</a>
          <a href="https://nuon.co/demo-request" class="hover:text-foreground">Book a Demo</a>
          <a href="https://nuon-byoc.slack.com" class="hover:text-foreground">Slack</a>
        </div>
        <div class="flex items-center gap-4">
          <span>&copy; 2026 Nuon</span>
          <a href="https://github.com/nuonco" class="hover:text-foreground">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
          </a>
          <a href="https://www.linkedin.com/company/nuonco" class="hover:text-foreground">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          </a>
        </div>
      </div>
    </footer>
  </div>

  <script id="site-data" type="application/json">{{ site_data | tojson }}</script>
  <script>
    window.SITE_DATA = JSON.parse(document.getElementById('site-data').textContent);

    function demoApp() {
      return {
        demos: [],
        dropdowns: [],
        search: '',
        openDd: '',
        f: { cloud: '', category: '', infra: '', stack: '', feature: '' },

        labels: {
          cloud: { 'aws': 'AWS', 'gcp': 'GCP', 'azure': 'Azure' },
          category: {
            'architecture': 'Architecture',
            'self-hosted': 'Self-Hosted Apps',
            'databases': 'Databases',
            'monitoring': 'Monitoring',
            'ai-ml': 'AI / ML',
            'serverless': 'Serverless',
            'security': 'Security',
          },
          infra: {
            'eks': 'EKS', 'ecs': 'ECS', 'ec2': 'EC2',
            'aca': 'ACA', 'aks': 'AKS', 'gke': 'GKE',
            'lambda': 'Lambda', 'cloud-run': 'Cloud Run',
            'cloud-function': 'Cloud Function', 'gcs': 'GCS',
          },
          stack: {
            'terraform': 'Terraform', 'helm': 'Helm',
            'manifest': 'K8s Manifest', 'docker': 'Docker Build',
            'container-image': 'Container Image', 'pulumi': 'Pulumi',
          },
          feature: {
            'actions': 'Actions', 'policies': 'Policies',
            'secrets': 'Secrets', 'byo': 'BYO Infra',
          },
        },

        init() {
          const d = window.SITE_DATA;
          this.demos = d.demos;
          this.dropdowns = [
            { key: 'cloud',    label: 'Cloud',    options: ['aws', 'gcp', 'azure'] },
            { key: 'category', label: 'Type',     options: d.categories },
            { key: 'infra',    label: 'Infra',    options: d.infra },
            { key: 'stack',    label: 'Stack',    options: d.stack },
            { key: 'feature',  label: 'Features', options: d.features },
          ];
        },

        filterLabel(key, val) {
          return (this.labels[key] && this.labels[key][val]) || val;
        },

        clearAll() {
          this.search = '';
          this.f = { cloud: '', category: '', infra: '', stack: '', feature: '' };
        },

        get hasActiveFilters() {
          return this.search !== '' || Object.values(this.f).some(v => v !== '');
        },

        get activeChips() {
          return Object.entries(this.f)
            .filter(([, v]) => v !== '')
            .map(([k, v]) => ({ key: k, label: this.filterLabel(k, v) }));
        },

        get filteredDemos() {
          return this.demos.filter(d => {
            const q = this.search.toLowerCase();
            if (q && !(
              d.title.toLowerCase().includes(q) ||
              d.description.toLowerCase().includes(q) ||
              d.name.toLowerCase().includes(q) ||
              d.tags.some(t => t.toLowerCase().includes(q))
            )) return false;
            if (this.f.cloud && d.cloud !== this.f.cloud) return false;
            if (this.f.category && !d.categories.includes(this.f.category)) return false;
            if (this.f.infra && d.infra !== this.f.infra) return false;
            if (this.f.stack && !d.stack.includes(this.f.stack)) return false;
            if (this.f.feature && !d.features.includes(this.f.feature)) return false;
            return true;
          });
        },
      };
    }
  </script>
</body>
</html>
