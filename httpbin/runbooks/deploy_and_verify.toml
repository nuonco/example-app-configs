name        = "deploy_and_verify"
description = "Deploys the EC2 component, then runs verification checks."
readme      = "./runbooks/deploy_and_verify.md"

[labels]
service = "ec2"
type    = "deployment"

[[steps]]
name           = "Deploy EC2 instance"
type           = "component_deploy"
component_name = "ec2"

[[steps]]
name        = "Healthcheck"
type        = "action"
action_name = "healthcheck"

[[steps]]
name        = "Instance status"
type        = "action"
action_name = "instance_status"

[[steps]]
name        = "Curl endpoints"
type        = "action"
action_name = "curl_endpoints"
