# action
name    = "instance_restart"
timeout = "2m"
enable_kube_config = false

[[triggers]]
type = "manual"

[[steps]]
name = "restart"
inline_contents = """
#!/usr/bin/env sh
set -e

echo "Restarting EC2 instance..."

# Get instance ID from public IP
INSTANCE_ID=$(aws ec2 describe-instances \
  --filters "Name=ip-address,Values=${PUBLIC_IP}" \
  --region ${REGION} \
  --query 'Reservations[0].Instances[0].InstanceId' \
  --output text)

echo "Instance ID: $INSTANCE_ID"

# Reboot the instance
aws ec2 reboot-instances \
  --instance-ids $INSTANCE_ID \
  --region ${REGION}

echo ""
echo "✓ Instance restart initiated"
"""

[steps.env_vars]
PUBLIC_IP = "{{.nuon.components.ec2.outputs.public_ip}}"
REGION = "{{.nuon.sandbox.outputs.account.region}}"

[[steps]]
name = "status"
inline_contents = """
#!/usr/bin/env sh
set -e

echo "Checking instance status after restart..."
sleep 5

# Get instance ID and check status
INSTANCE_ID=$(aws ec2 describe-instances \
  --filters "Name=ip-address,Values=${PUBLIC_IP}" \
  --region ${REGION} \
  --query 'Reservations[0].Instances[0].InstanceId' \
  --output text)

aws ec2 describe-instance-status \
  --instance-ids $INSTANCE_ID \
  --region ${REGION} \
  --output table

echo ""
echo "✓ Status check complete"
"""

[steps.env_vars]
PUBLIC_IP = "{{.nuon.components.ec2.outputs.public_ip}}"
REGION = "{{.nuon.sandbox.outputs.account.region}}"
