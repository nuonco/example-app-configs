# helm
name           = "penpot"
type           = "helm_chart"
chart_name     = "penpot"
namespace      = "penpot"
storage_driver = "configmap"
max_auto_retries = 5

[public_repo]
repo      = "penpot/penpot-helm"
directory = "charts/penpot"
branch    = "main"

[[values_file]]
contents = "./values/penpot.yaml"
