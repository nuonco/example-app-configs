# inputs
[[group]]
name         = "dns"
description  = "DNS Configrations"
display_name = "Configurations for the root domain for Route53"

[[input]]
name         = "domain"
description  = "domain for the whoami endpoint e.g., nuon.run"
default      = "nuon.run"
display_name = "Domain"
group        = "dns"

[[input]]
name         = "sub_domain"
description  = "The sub domain for the Whoami service"
default      = "whoami"
display_name = "Sub Domain"
group        = "dns"


[[group]]
name         = "compute_cluster"
description  = "Compute Cluster"
display_name = "Configurations for the compute cluster"

[[input]]
name         = "cluster_endpoint_public_access"
description  = "Set to true to enable public access for the compute cluster."
default      = "false"
display_name = "Public Access"
type         = "bool"
group        = "compute_cluster"

