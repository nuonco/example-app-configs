name    = "verify_secrets"
timeout = "1m"

[[triggers]]
type           = "post-deploy-component"
component_name = "secrets_demo"

[[triggers]]
type = "manual"

[[steps]]
name             = "verify secrets synced"
enable_kube_config = true
inline_contents  = """
#!/usr/bin/env sh
set -e

echo "=== Kubernetes secrets in secrets-demo namespace ==="
kubectl get secrets -n secrets-demo

echo ""
echo "=== auto-generated-token ==="
kubectl describe secret auto-generated-token -n secrets-demo || echo "not found"

echo ""
echo "=== api-key-secret ==="
kubectl describe secret api-key-secret -n secrets-demo || echo "not found"
"""
