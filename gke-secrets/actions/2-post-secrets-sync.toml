name               = "post_secrets_sync"
timeout            = "30s"
enable_kube_config = true

[[triggers]]
type = "post-deploy-all-components"

[[triggers]]
type = "manual"

[[steps]]
name = "restart_for_new_secrets"
inline_contents = """
#!/usr/bin/env sh
set -e
set -o pipefail

echo "=== secrets synced, restarting pods to pick up changes ==="
kubectl rollout restart deployment/secrets-demo -n secrets-demo 2>/dev/null || echo "deployment not yet created, skipping"
kubectl rollout status deployment/secrets-demo -n secrets-demo --timeout=30s 2>/dev/null || true

echo "=== verifying secrets are mounted ==="
kubectl get secrets -n secrets-demo
echo "secrets sync complete"
"""
