name               = "run_agent_prompt"
timeout            = "5m"
enable_kube_config = true

# Manual: operator triggers with a custom prompt at run time. Override
# PROMPT (and optionally CLAUDE_MODEL) from the run-action dialog in the
# Nuon dashboard before clicking Run — those env vars feed into agent.py.
[[triggers]]
type = "manual"

[[steps]]
name    = "Send a custom prompt to Claude and trace it in Langfuse"
command = "./run.sh"

[steps.public_repo]
repo      = "nuonco/example-app-configs"
directory = "langfuse/src/actions/run_agent_prompt"
branch    = "mm/langfuse"

[steps.env_vars]
LANGFUSE_HOST        = "https://{{ .nuon.install.sandbox.outputs.nuon_dns.public_domain.name }}"
LANGFUSE_NAMESPACE   = "langfuse"
LANGFUSE_SECRET_NAME = "langfuse-secrets"
# The Anthropic API key is a CFN-parameter secret in AWS Secrets Manager
# (see secrets.toml). run.sh fetches it via secretsmanager:GetSecretValue
# rather than receiving the plaintext value as an env var here.
ANTHROPIC_SECRET_ARN = "{{ .nuon.install_stack.outputs.anthropic_api_key_arn }}"
REGION               = "{{ .nuon.install_stack.outputs.region }}"
PROMPT               = "Write a one-paragraph fun fact about distributed systems."
CLAUDE_MODEL         = "claude-sonnet-4-6"
