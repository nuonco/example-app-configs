# action
name               = "seed_demo_traces"
timeout            = "5m"
enable_kube_config = true

[[triggers]]
type = "manual"

[[steps]]
name    = "Run a small tool-using agent that emits Langfuse traces"
command = "./run.sh"

[steps.public_repo]
repo      = "nuonco/example-app-configs"
directory = "langfuse/src/actions/seed_demo_traces"
branch    = "mm/langfuse"

[steps.env_vars]
LANGFUSE_HOST        = "https://{{ .nuon.install.sandbox.outputs.nuon_dns.public_domain.name }}"
LANGFUSE_NAMESPACE   = "langfuse"
LANGFUSE_SECRET_NAME = "langfuse-secrets"
# The Anthropic API key is no longer a Nuon input — it's a CFN-parameter
# secret stored in AWS Secrets Manager. The install stack exposes the
# ARN as an output; run.sh fetches the SecretString via the AWS CLI at
# run time using the maintenance role's secretsmanager:GetSecretValue.
ANTHROPIC_SECRET_ARN = "{{ .nuon.install_stack.outputs.anthropic_api_key_arn }}"
REGION               = "{{ .nuon.install_stack.outputs.region }}"
