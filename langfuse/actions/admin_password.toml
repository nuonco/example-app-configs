name    = "admin_password"
timeout = "1m"

# Manual: operator can pull credentials anytime from the dashboard.
[[triggers]]
type = "manual"

# Auto: surface the credentials in the workflow output immediately after the
# Langfuse helm release finishes deploying, so the first thing the operator
# sees post-install is "here's how to log in."
[[triggers]]
type           = "post-deploy-component"
component_name = "langfuse"

[[steps]]
name    = "Print Langfuse Admin Credentials"
command = "./get-password.sh"

[steps.public_repo]
repo      = "nuonco/example-app-configs"
directory = "langfuse/src/actions/admin_password"
branch    = "main"

[steps.env_vars]
LANGFUSE_NAMESPACE   = "langfuse"
LANGFUSE_SECRET_NAME = "langfuse-secrets"
LANGFUSE_URL         = "https://{{ .nuon.install.sandbox.outputs.nuon_dns.public_domain.name }}"
ADMIN_EMAIL          = "admin@langfuse.local"
