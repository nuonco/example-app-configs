# secrets

[[secret]]
name         = "anthropic_api_key"
display_name = "Anthropic API Key"
description  = "Anthropic API key from console.anthropic.com. Consumed by the seed_demo_traces and run_agent_prompt actions. Customer enters this value when applying the install stack CloudFormation template; Nuon stores it in the customer's AWS Secrets Manager and exposes the ARN as an install_stack output. Leave blank if you don't intend to run the demo actions."
required     = false
