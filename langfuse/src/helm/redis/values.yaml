image:
  repository: redis
  tag: "7-alpine"
  pullPolicy: IfNotPresent

auth:
  existingSecret: langfuse-redis
  existingSecretPasswordKey: password

persistence:
  enabled: true
  size: 8Gi
  storageClass: ebs-auto

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "1Gi"
    cpu: "1000m"
