---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami-restricted
  namespace: kube-system
  labels:
    app: whoami-restricted
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami-restricted
  template:
    metadata:
      labels:
        app: whoami-restricted
    spec:
      containers:
      - name: whoami
        image: "traefik/whoami:latest"
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: ".25"
            memory: "128Mi"
          requests:
            cpu: ".1"
            memory: "64Mi"
