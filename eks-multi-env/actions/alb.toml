# action
name    = "alb"
timeout = "1m"
enable_kube_config = true

[[triggers]]
type = "manual"

[[steps]]
name = "elbv2"
inline_contents = "./src/alb/elbv2.sh"

[steps.env_vars]
INGRESS_NAME      = "{{.nuon.install.id}}-dev"
INGRESS_NAMESPACE = "dev"

[[steps]]
name = "upstreams"
inline_contents = "./src/alb/upstreams.sh"

[steps.env_vars]
INGRESS_NAME      = "{{.nuon.install.id}}-dev"
INGRESS_NAMESPACE = "dev"

[[steps]]
name = "sg"
inline_contents = "./src/alb/sg.sh"

[steps.env_vars]
INGRESS_NAME      = "{{.nuon.install.id}}-dev"
INGRESS_NAMESPACE = "dev"

[[steps]]
name = "acl"
inline_contents = "./src/alb/acl.sh"

[steps.env_vars]
INGRESS_NAME      = "{{.nuon.install.id}}-dev"
INGRESS_NAMESPACE = "dev"
