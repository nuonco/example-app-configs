apiVersion: v1
kind: Service
metadata:
  name: forgejo-http
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: forgejo
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "forgejo-bc"}'
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: forgejo
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: forgejo-bc
  namespace: {{ .Release.Namespace }}
spec:
  healthCheck:
    type: HTTP
    port: 3000
    requestPath: /api/healthz
