apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: forgejo
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: forgejo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgejo
    spec:
      serviceAccountName: forgejo
      securityContext:
        fsGroup: 1000
      containers:
        - name: forgejo
          image: {{ .Values.image | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command: ["/bin/sh", "/etc/forgejo/entrypoint.sh"]
          args: ["/bin/s6-svscan", "/etc/s6"]
          env:
            - {name: DB_HOST,          valueFrom: {secretKeyRef: {name: {{ .Values.dbSecretName }},    key: host}}}
            - {name: DB_PORT,          valueFrom: {secretKeyRef: {name: {{ .Values.dbSecretName }},    key: port}}}
            - {name: DB_NAME,          valueFrom: {secretKeyRef: {name: {{ .Values.dbSecretName }},    key: database}}}
            - {name: DB_USER,          valueFrom: {secretKeyRef: {name: {{ .Values.dbSecretName }},    key: username}}}
            - {name: DB_PASSWORD,      valueFrom: {secretKeyRef: {name: {{ .Values.dbSecretName }},    key: password}}}
            - {name: CACHE_HOST,       valueFrom: {secretKeyRef: {name: {{ .Values.cacheSecretName }}, key: host}}}
            - {name: CACHE_PORT,       valueFrom: {secretKeyRef: {name: {{ .Values.cacheSecretName }}, key: port}}}
            - {name: S3_ACCESS_ID,     valueFrom: {secretKeyRef: {name: {{ .Values.s3SecretName }},    key: access_id}}}
            - {name: S3_ACCESS_SECRET, valueFrom: {secretKeyRef: {name: {{ .Values.s3SecretName }},    key: access_secret}}}
            - {name: LFS_JWT_SECRET,      valueFrom: {secretKeyRef: {name: forgejo-internal, key: LFS_JWT_SECRET}}}
            - {name: SECURITY_SECRET_KEY, valueFrom: {secretKeyRef: {name: forgejo-internal, key: SECURITY_SECRET_KEY}}}
            - {name: INTERNAL_TOKEN,      valueFrom: {secretKeyRef: {name: forgejo-internal, key: INTERNAL_TOKEN}}}
            - {name: FORGEJO__service__DISABLE_REGISTRATION, value: "true"}
            - {name: FORGEJO__admin__USER_NAME, value: {{ .Values.adminUser | quote }}}
            - {name: FORGEJO__admin__EMAIL,     value: {{ .Values.adminEmail | quote }}}
          ports:
            - name: http
              containerPort: 3000
            - name: ssh
              containerPort: 2222
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - {name: data,   mountPath: /data}
            - {name: config, mountPath: /etc/forgejo}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forgejo-data
        - name: config
          configMap:
            name: forgejo-config
            defaultMode: 0755
