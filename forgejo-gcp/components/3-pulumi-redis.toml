name             = "pulumi_redis"
type             = "pulumi"
runtime          = "go"
max_auto_retries = 5

[public_repo]
repo      = "nuonco/example-app-configs"
directory = "forgejo-gcp/src/components/pulumi-redis"
branch    = "main"

[config]
"gcp:project" = "{{ .nuon.install_stack.outputs.project_id }}"
"gcp:region"  = "{{ .nuon.install_stack.outputs.region }}"

[env_vars]
INSTALL_ID      = "{{ .nuon.install.id }}"
PROJECT_ID      = "{{ .nuon.install_stack.outputs.project_id }}"
REGION          = "{{ .nuon.install_stack.outputs.region }}"
NETWORK         = "{{ .nuon.install.sandbox.outputs.vpc.network }}"
REDIS_MEMORY_GB = "{{ .nuon.inputs.inputs.redis_memory_gb }}"
