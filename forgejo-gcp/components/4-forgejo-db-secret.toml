name         = "forgejo_db_secret"
type         = "kubernetes_manifest"
dependencies = ["pulumi_postgres"]
namespace    = "forgejo"

manifest = """
apiVersion: v1
kind: Secret
metadata:
  name: forgejo-db
  namespace: forgejo
type: Opaque
stringData:
  host: "{{ .nuon.components.pulumi_postgres.outputs.host }}"
  port: "{{ .nuon.components.pulumi_postgres.outputs.port }}"
  database: "{{ .nuon.components.pulumi_postgres.outputs.database }}"
  username: "{{ .nuon.components.pulumi_postgres.outputs.username }}"
  password: "{{ .nuon.components.pulumi_postgres.outputs.password }}"
"""
max_auto_retries = 5
