# https://github.com/christianhuth/helm-charts/blob/main/charts/baserow/values.yaml
# https://hub.docker.com/r/baserow/baserow/tags

frontend:
  image:
    tag: "{{.nuon.inputs.inputs.baserow_release}}"

  ingress:
    enabled: false

  livenessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 60    
    periodSeconds: 10
    timeoutSeconds: 10
    successThreshold: 1

  readinessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 10
    successThreshold: 1

  resources:
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    limits:
      cpu: 100m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi




backend:
  asgi:
    image:
      tag: "{{.nuon.inputs.inputs.baserow_release}}"
    extraEnv:
      - name: BASEROW_EXTRA_ALLOWED_HOSTS
        value: "api.{{.nuon.install.sandbox.outputs.nuon_dns.public_domain.name}}"

  celery:
    image:
      tag: "{{.nuon.inputs.inputs.baserow_release}}"

  wsgi:
    image:
      tag: "{{.nuon.inputs.inputs.baserow_release}}"
    extraEnv:
      - name: BASEROW_EXTRA_ALLOWED_HOSTS
        value: "api.{{.nuon.install.sandbox.outputs.nuon_dns.public_domain.name}}"

    ingress:
      enabled: false

  config:
    airtableImportSoftTimeLimit: "1800"
    hoursUntilTrashPermanentlyDeleted: "24"
    initialCreateSyncTableDataLimit: "5000"
    logging:
      backendDebug: "off"
      # -- The default log level used by the backend, supports ERROR, WARNING, INFO, DEBUG, TRACE
      backendLogLevel: "INFO"
      databaseLogLevel: "ERROR"
    tokens:
      # -- The number of minutes which specifies how long access tokens are valid. This will be converted in a timedelta value and added to the current UTC time during token generation to obtain the token's default "exp" claim value.
      accessTokenLifetimeMinutes: "10"
      # -- The number of hours which specifies how long refresh tokens are valid. This will be converted in a timedelta value and added to the current UTC time during token generation to obtain the token's default "exp" claim value.
      refreshTokenLifetimeHours: "168"  

config:
  # -- The publicly accessible URL of the backend. Should include the port if non-standard.
  publicBackendUrl: "https://api.{{.nuon.install.sandbox.outputs.nuon_dns.public_domain.name}}"
  #publicBackendUrl: "http://localhost:8000"
  # -- The publicly accessible URL of the frontend. Should include the port if non-standard.
  publicFrontendUrl: "https://{{.nuon.install.sandbox.outputs.nuon_dns.public_domain.name}}"

persistence:
  # -- use a PVC to persist file uploads
  enabled: true
  # -- the desired access modes the volume should have.
  accessModes:
    - ReadWriteOnce
  # -- Annotations to be added to the PersistentVolumeClaim
  annotations: {}
  # -- provide an existing PersistentVolumeClaim
  existingClaim: ""
  # -- Name of the StorageClass required by the claim.
  storageClassName: "gp2"
  # -- Storage size for file uploads
  size: "20Gi"

postgresql:
  enabled: true
  auth:
    database: baserow
    username: baserow
    password: baserow

redis:
  enabled: true
  auth:
    enabled: true
    password: baserow
