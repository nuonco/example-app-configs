# action
name               = "connections_status"
timeout            = "2m"
enable_kube_config = false
description        = "Show active SSH and VS Code Web connection counts and client IPs"

[[triggers]]
type = "manual"

[[triggers]]
type          = "cron"
cron_schedule = "*/5 * * * *"

[[steps]]
name = "check_connections"
inline_contents = """
#!/usr/bin/env sh
set -e

SSM_PING=$(aws ssm describe-instance-information \
  --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
  --region "$REGION" \
  --query "InstanceInformationList[0].PingStatus" \
  --output text 2>/dev/null || echo "None")

if [ "$SSM_PING" != "Online" ]; then
  echo '{"ssh_count":0,"ssh_clients":[],"vscode_count":0,"vscode_clients":[]}' >> "${NUON_ACTIONS_OUTPUT_FILEPATH:-/dev/null}"
  echo "SSM agent not reachable — VM is likely stopped"
  exit 1
fi

COMMAND_ID=$(aws ssm send-command \
  --instance-ids "$INSTANCE_ID" \
  --document-name "AWS-RunShellScript" \
  --parameters '{"commands":["ss -tn"]}' \
  --region "$REGION" \
  --output text \
  --query "Command.CommandId")

sleep 5
SS_OUTPUT=$(aws ssm get-command-invocation \
  --command-id "$COMMAND_ID" \
  --instance-id "$INSTANCE_ID" \
  --region "$REGION" \
  --query "StandardOutputContent" \
  --output text 2>/dev/null || echo "")

SSH_IPS_RAW=$(echo "$SS_OUTPUT" | grep ESTAB | grep ':22 ' | awk '{print $5}' | cut -d: -f1 | sort -u)
VSCODE_IPS_RAW=$(echo "$SS_OUTPUT" | grep ESTAB | grep ':8080 ' | awk '{print $5}' | cut -d: -f1 | sort -u)

if [ -z "$SSH_IPS_RAW" ]; then
  SSH_COUNT=0; SSH_ARRAY=
else
  SSH_COUNT=$(echo "$SSH_IPS_RAW" | wc -l | tr -d ' ')
  SSH_ARRAY=$(echo "$SSH_IPS_RAW" | sed 's/^/"/;s/$/"/' | paste -sd,)
fi

if [ -z "$VSCODE_IPS_RAW" ]; then
  VSCODE_COUNT=0; VSCODE_ARRAY=
else
  VSCODE_COUNT=$(echo "$VSCODE_IPS_RAW" | wc -l | tr -d ' ')
  VSCODE_ARRAY=$(echo "$VSCODE_IPS_RAW" | sed 's/^/"/;s/$/"/' | paste -sd,)
fi

echo "SSH connections: $SSH_COUNT"
echo "VS Code connections: $VSCODE_COUNT"
echo '{"ssh_count":'$SSH_COUNT',"ssh_clients":['$SSH_ARRAY'],"vscode_count":'$VSCODE_COUNT',"vscode_clients":['$VSCODE_ARRAY']}' >> "${NUON_ACTIONS_OUTPUT_FILEPATH:-/dev/null}"
"""

[steps.env_vars]
INSTANCE_ID = "{{.nuon.components.ec2.outputs.instance_id}}"
REGION      = "{{.nuon.sandbox.outputs.account.region}}"
