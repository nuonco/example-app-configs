# action
name               = "install_dotfiles"
timeout            = "10m"
enable_kube_config = false
description        = "Clone the dotfiles repo and run install.sh on the dev environment VM"

[[triggers]]
type = "post-provision"

[[triggers]]
type = "manual"

[[steps]]
name = "install_dotfiles"
inline_contents = """
#!/bin/bash
set -e

if [ -z "$DOTFILES_REPO" ]; then
  echo "No dotfiles repo configured, skipping"
  exit 0
fi

echo "Waiting for SSM agent..."
for i in $(seq 1 30); do
  STATUS=$(aws ssm describe-instance-information \
    --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
    --region "$REGION" \
    --query "InstanceInformationList[0].PingStatus" \
    --output text 2>/dev/null || echo "None")
  [ "$STATUS" = "Online" ] && echo "SSM agent online" && break
  echo "Attempt $i/30, status: $STATUS"
  sleep 10
done

[ "$STATUS" = "Online" ] || { echo "SSM agent did not come online in time"; exit 1; }

cat > /tmp/install-dotfiles.sh << 'SCRIPT'
#!/bin/bash
set -e
cd /home/SSH_USER_VAL
git clone DOTFILES_REPO_VAL ~/.dotfiles
cd ~/.dotfiles
bash install.sh
chown -R SSH_USER_VAL:SSH_USER_VAL /home/SSH_USER_VAL/.dotfiles
echo "Dotfiles installed successfully"
SCRIPT

sed -i "s|SSH_USER_VAL|$SSH_USER|g" /tmp/install-dotfiles.sh
sed -i "s|DOTFILES_REPO_VAL|$DOTFILES_REPO|g" /tmp/install-dotfiles.sh

SCRIPT_B64=$(base64 -w 0 /tmp/install-dotfiles.sh)

COMMAND_ID=$(aws ssm send-command \
  --instance-ids "$INSTANCE_ID" \
  --document-name "AWS-RunShellScript" \
  --parameters "{\"commands\":[\"echo $SCRIPT_B64 | base64 -d | bash\"]}" \
  --region "$REGION" \
  --output text \
  --query "Command.CommandId")

echo "SSM command ID: $COMMAND_ID"

STATUS="InProgress"
for i in $(seq 1 60); do
  sleep 10
  STATUS=$(aws ssm get-command-invocation \
    --command-id "$COMMAND_ID" \
    --instance-id "$INSTANCE_ID" \
    --region "$REGION" \
    --query "Status" \
    --output text 2>/dev/null || echo "InProgress")
  echo "Status: $STATUS"
  case "$STATUS" in
    Success)
      aws ssm get-command-invocation \
        --command-id "$COMMAND_ID" \
        --instance-id "$INSTANCE_ID" \
        --region "$REGION" \
        --query "StandardOutputContent" \
        --output text 2>/dev/null || true
      break ;;
    Failed|Cancelled|TimedOut|DeliveryTimedOut)
      echo "=== stdout ==="
      aws ssm get-command-invocation \
        --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
        --region "$REGION" --query "StandardOutputContent" --output text 2>/dev/null || true
      echo "=== stderr ==="
      aws ssm get-command-invocation \
        --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
        --region "$REGION" --query "StandardErrorContent" --output text 2>/dev/null || true
      echo "Dotfiles install failed: $STATUS"
      exit 1 ;;
  esac
done

[ "$STATUS" = "Success" ] || { echo "Timed out waiting for command"; exit 1; }
"""

[steps.env_vars]
INSTANCE_ID   = "{{.nuon.components.ec2.outputs.instance_id}}"
REGION        = "{{.nuon.sandbox.outputs.account.region}}"
SSH_USER      = "{{.nuon.components.ec2.outputs.ssh_user}}"
DOTFILES_REPO = "{{.nuon.install.inputs.dotfiles_repo}}"
