# action
name               = "install_claude_code"
timeout            = "15m"
enable_kube_config = false
description        = "Install or update Claude Code CLI to the latest version"

[[triggers]]
type = "manual"

[[steps]]
name = "install_claude_code"
inline_contents = """
#!/bin/bash
set -e

echo "Waiting for SSM agent..."
for i in $(seq 1 12); do
  STATUS=$(aws ssm describe-instance-information \
    --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
    --region "$REGION" \
    --query "InstanceInformationList[0].PingStatus" \
    --output text 2>/dev/null || echo "None")
  [ "$STATUS" = "Online" ] && break
  echo "Attempt $i/12, status: $STATUS"
  sleep 10
done

[ "$STATUS" = "Online" ] || { echo "SSM agent not available"; exit 1; }

ANTHROPIC_KEY=$(aws ssm get-parameter \
  --name "$ANTHROPIC_API_KEY_PARAM" \
  --with-decryption \
  --region "$REGION" \
  --query "Parameter.Value" \
  --output text 2>/dev/null || true)

cat > /tmp/install-claude-code.sh << 'SCRIPT'
#!/bin/bash
set -eo pipefail
export HOME=/root

if [ "OS_VAL" = "ubuntu-24.04" ]; then
  curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
  apt-get install -y nodejs
else
  dnf install -y nodejs npm 2>/dev/null || true
fi

npm install -g @anthropic-ai/claude-code

if [ -n "ANTHROPIC_KEY_VAL" ] && ! grep -q ANTHROPIC_API_KEY /home/SSH_USER_VAL/.bashrc; then
  echo "export ANTHROPIC_API_KEY=ANTHROPIC_KEY_VAL" >> /home/SSH_USER_VAL/.bashrc
fi

echo "Claude Code installed"
SCRIPT

sed -i "s|OS_VAL|$OS|g" /tmp/install-claude-code.sh
sed -i "s|SSH_USER_VAL|$SSH_USER|g" /tmp/install-claude-code.sh
sed -i "s|ANTHROPIC_KEY_VAL|$ANTHROPIC_KEY|g" /tmp/install-claude-code.sh

SCRIPT_B64=$(base64 -w 0 /tmp/install-claude-code.sh)

COMMAND_ID=$(aws ssm send-command \
  --instance-ids "$INSTANCE_ID" \
  --document-name "AWS-RunShellScript" \
  --parameters "{\\"commands\\":[\\"echo $SCRIPT_B64 | base64 -d | bash\\"]}" \
  --region "$REGION" \
  --output text \
  --query "Command.CommandId")

echo "SSM command ID: $COMMAND_ID"

STATUS="InProgress"
for i in $(seq 1 30); do
  sleep 10
  STATUS=$(aws ssm get-command-invocation \
    --command-id "$COMMAND_ID" \
    --instance-id "$INSTANCE_ID" \
    --region "$REGION" \
    --query "Status" \
    --output text 2>/dev/null || echo "InProgress")
  echo "Status: $STATUS"
  case "$STATUS" in
    Success) echo "Claude Code installed successfully"; break ;;
    Failed|Cancelled|TimedOut|DeliveryTimedOut)
      echo "=== SSM stdout ==="
      aws ssm get-command-invocation \
        --command-id "$COMMAND_ID" \
        --instance-id "$INSTANCE_ID" \
        --region "$REGION" \
        --query "StandardOutputContent" \
        --output text 2>/dev/null || true
      echo "=== SSM stderr ==="
      aws ssm get-command-invocation \
        --command-id "$COMMAND_ID" \
        --instance-id "$INSTANCE_ID" \
        --region "$REGION" \
        --query "StandardErrorContent" \
        --output text 2>/dev/null || true
      echo "Install failed: $STATUS"
      exit 1 ;;
  esac
done

[ "$STATUS" = "Success" ] || { echo "Timed out"; exit 1; }
"""

[steps.env_vars]
INSTANCE_ID             = "{{.nuon.components.ec2.outputs.instance_id}}"
REGION                  = "{{.nuon.sandbox.outputs.account.region}}"
OS                      = "{{.nuon.install.inputs.os}}"
SSH_USER                = "{{.nuon.components.ec2.outputs.ssh_user}}"
ANTHROPIC_API_KEY_PARAM = "/cde/{{.nuon.install.id}}/anthropic-api-key"
