# action
name               = "install_claude_code"
timeout            = "5m"
enable_kube_config = false
description        = "Install or update Claude Code CLI to the latest version"

[[triggers]]
type = "manual"

[[steps]]
name = "install_claude_code"
inline_contents = """
#!/bin/bash
set -e

echo "Waiting for SSM agent..."
for i in $(seq 1 12); do
  STATUS=$(aws ssm describe-instance-information \
    --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
    --region "$REGION" \
    --query "InstanceInformationList[0].PingStatus" \
    --output text 2>/dev/null || echo "None")
  [ "$STATUS" = "Online" ] && break
  echo "Attempt $i/12, status: $STATUS"
  sleep 10
done

[ "$STATUS" = "Online" ] || { echo "SSM agent not available"; exit 1; }

if [ "$OS" = "ubuntu-24.04" ]; then
  NODE_INSTALL='curl -fsSL https://deb.nodesource.com/setup_lts.x | bash - && apt-get install -y nodejs'
else
  NODE_INSTALL='dnf install -y nodejs npm 2>/dev/null || true'
fi

COMMAND_ID=$(aws ssm send-command \
  --instance-ids "$INSTANCE_ID" \
  --document-name "AWS-RunShellScript" \
  --parameters "{\"commands\":[\"$NODE_INSTALL\", \"npm install -g @anthropic-ai/claude-code\"]}" \
  --region "$REGION" \
  --output text \
  --query "Command.CommandId")

echo "SSM command ID: $COMMAND_ID"

STATUS="InProgress"
for i in $(seq 1 30); do
  sleep 10
  STATUS=$(aws ssm get-command-invocation \
    --command-id "$COMMAND_ID" \
    --instance-id "$INSTANCE_ID" \
    --region "$REGION" \
    --query "Status" \
    --output text 2>/dev/null || echo "InProgress")
  echo "Status: $STATUS"
  case "$STATUS" in
    Success) echo "Claude Code installed successfully"; break ;;
    Failed|Cancelled|TimedOut|DeliveryTimedOut) echo "Install failed: $STATUS"; exit 1 ;;
  esac
done

[ "$STATUS" = "Success" ] || { echo "Timed out"; exit 1; }
"""

[steps.env_vars]
INSTANCE_ID = "{{.nuon.components.ec2.outputs.instance_id}}"
REGION      = "{{.nuon.sandbox.outputs.account.region}}"
OS          = "{{.nuon.install.inputs.os}}"
