# secrets

[[secret]]
name         = "anthropic_api_key"
display_name = "Anthropic API Key"
description  = "Anthropic API key from console.anthropic.com. Wired into the Coder server as CODER_AI_GATEWAY_ANTHROPIC_KEY to enable Coder's AI gateway. Customer enters this value as a CloudFormation parameter when applying the install stack; Nuon stores it in the customer's AWS Secrets Manager and syncs it to the coder namespace as a Kubernetes Secret. Leave blank if the AI gateway is not in use."
required     = false

kubernetes_sync             = true
kubernetes_secret_namespace = "coder"
kubernetes_secret_name      = "coder-anthropic-key"
