# helm

name           = "coder"
type           = "helm_chart"
labels         = { beta = "true" }
chart_name     = "coder"
namespace      = "coder"
storage_driver = "configmap"
dependencies   = ["rds_cluster_coder"]
max_auto_retries = 5

[helm_repo]
repo_url = "https://helm.coder.com/v2"
chart    = "coder-v4"

[[values_file]]
contents = "./values/coder.yaml"
