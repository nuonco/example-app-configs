name    = "break_glass_revoke_eks_access"
timeout = "1m"
role    = "{{.nuon.install.id}}-maintenance"
labels  = { service = "eks", type = "break-glass", destructive = "true" }

[[triggers]]
type = "manual"

[[triggers]]
type = "role-disabled"

[[steps]]
name = "revoke-eks-access"
inline_contents = '''
#!/usr/bin/env bash

set -euo pipefail

export AWS_PAGER=""
export AWS_DEFAULT_REGION="$AWS_REGION"

# role-disabled fires for any role on the install; only revoke for the break-glass role.
# ROLE_NAME is unset on a manual run, so that path always proceeds.
if [ -n "${ROLE_NAME:-}" ] && [ "$ROLE_NAME" != "$BREAK_GLASS_ROLE" ]; then
  echo "==> role ${ROLE_NAME} is not the break-glass role, skipping"
  exit 0
fi

aws sts get-caller-identity | jq -c

# Runs under the maintenance role: on role-disabled the break-glass role is being
# torn down and can't be assumed, so the break-glass role can't revoke itself.
# Construct the principal ARN from the account + role name (the break_glass_role_arns
# stack output is empty once the role is disabled).
ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
PRINCIPAL_ARN="arn:aws:iam::${ACCOUNT}:role/${BREAK_GLASS_ROLE}"

existed=false
state="not_found"
if aws eks describe-access-entry \
  --cluster-name "$CLUSTER_NAME" \
  --principal-arn "$PRINCIPAL_ARN" >/dev/null 2>&1; then
  existed=true
  echo "==> deleting access entry for $PRINCIPAL_ARN"
  aws eks delete-access-entry \
    --cluster-name "$CLUSTER_NAME" \
    --principal-arn "$PRINCIPAL_ARN"
  state="revoked"
else
  echo "==> no access entry found for $PRINCIPAL_ARN, nothing to revoke"
fi

jq --null-input -c \
  --arg principal_arn "$PRINCIPAL_ARN" \
  --arg cluster "$CLUSTER_NAME" \
  --argjson existed "$existed" \
  --arg state "$state" \
  --arg updated_at "$(TZ=UTC date +%Y-%m-%dT%H:%M:%SZ)" \
  '{principal_arn: $principal_arn, cluster: $cluster, existed: $existed, state: $state, updated_at: $updated_at}' \
  > "$NUON_ACTIONS_OUTPUT_FILEPATH"
'''

[steps.env_vars]
BREAK_GLASS_ROLE = "{{.nuon.install.id}}-coder-sandbox-break-glass"
CLUSTER_NAME  = "{{ .nuon.install.sandbox.outputs.cluster.name }}"
AWS_REGION    = "{{ .nuon.install.sandbox.outputs.account.region }}"
