# action

name    = "alb_healthcheck"
timeout = "30s"
enable_kube_config = true

[[triggers]]
type = "manual"

[[steps]]
name    = "alb-healthcheck"
command = "./healthcheck.sh"

[steps.public_repo]
repo      = "nuonco/example-app-configs"
directory = "coder/src/actions/alb"
branch    = "main"

[steps.env_vars]
INGRESS_NAME              = "{{.nuon.install.id}}-public"
INGRESS_NAMESPACE         = "coder"
GRAFANA_INGRESS_NAMESPACE = "coder-observability"
