#:schema https://api.nuon.co/v1/general/config-schema?type=helm
name           = "ollama_server"
type           = "helm_chart"
chart_name     = "ollama"
namespace      = "n8n"
storage_driver = "configmap"
dependencies   = []
timeout        = "15m"

[connected_repo]
repo      = "nuonco/n8n"
directory = "src/helm/ollama"
branch    = "main"

[[values_file]]
contents = "./values/ollama/ollama.yaml"

