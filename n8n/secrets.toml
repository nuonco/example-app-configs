#:schema https://api.nuon.co/v1/general/config-schema?source=secrets

[[secret]]
name = "postgres_password"
display_name = "PostgreSQL Password"
description = "PostgreSQL database password (16+ characters recommended)"

[[secret]]
name = "redis_password"
display_name = "Redis Password"
description = "Redis authentication password"

[[secret]]
name = "encryption_key"
display_name = "n8n Encryption Key"
description = "Encryption key for n8n credentials storage (32+ characters)"

[[secret]]
name = "jwt_secret"
display_name = "JWT Secret"
description = "Secret key for JWT authentication (32+ characters)"
