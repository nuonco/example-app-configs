name: Sync All Nuon Apps

on:
  workflow_dispatch:
    inputs:
      org_id:
        description: "Nuon org ID (defaults to repo variable NUON_ORG_ID)"
        required: false
        type: string
        default: ""
      apps:
        description: "Optional comma-separated subset of apps (default: all)"
        required: false
        type: string
        default: ""
      dry_run:
        description: "Run without --create"
        required: false
        type: boolean
        default: false

  schedule:
    - cron: "0 6 * * *"

  workflow_call:
    inputs:
      org_id:
        type: string
        required: false
        default: ""
      apps:
        type: string
        required: false
        default: ""
      dry_run:
        type: boolean
        required: false
        default: false
    secrets:
      NUON_API_TOKEN:
        required: true

permissions:
  contents: read

concurrency:
  group: sync-all-apps
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_apps: ${{ steps.set-matrix.outputs.has_apps }}
      org_id: ${{ steps.cfg.outputs.org_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve org_id
        id: cfg
        env:
          INPUT_ORG_ID: ${{ inputs.org_id }}
          VAR_ORG_ID: ${{ vars.NUON_ORG_ID }}
        run: |
          ORG_ID="${INPUT_ORG_ID:-$VAR_ORG_ID}"
          if [ -z "$ORG_ID" ]; then
            echo "::error::no org_id provided and NUON_ORG_ID repo variable is not set"
            exit 1
          fi
          echo "org_id=$ORG_ID" >> "$GITHUB_OUTPUT"

      - name: Discover apps
        id: set-matrix
        env:
          APPS_FILTER: ${{ inputs.apps }}
        run: |
          set -euo pipefail

          # An "app" dir is any top-level directory containing a metadata.toml.
          mapfile -t ALL < <(find . -mindepth 2 -maxdepth 2 -name 'metadata.toml' -printf '%h\n' \
            | sed 's|^\./||' \
            | sort -u)

          if [ -n "${APPS_FILTER}" ]; then
            IFS=',' read -ra REQUESTED <<< "${APPS_FILTER}"
            SELECTED=()
            for want in "${REQUESTED[@]}"; do
              want_trimmed="$(echo "$want" | xargs)"
              [ -z "$want_trimmed" ] && continue
              found=false
              for app in "${ALL[@]}"; do
                if [ "$app" = "$want_trimmed" ]; then
                  SELECTED+=("$app")
                  found=true
                  break
                fi
              done
              if [ "$found" = false ]; then
                echo "::warning::requested app '$want_trimmed' not found in repo; skipping"
              fi
            done
          else
            SELECTED=("${ALL[@]}")
          fi

          if [ "${#SELECTED[@]}" -eq 0 ]; then
            echo "No apps to sync"
            echo "has_apps=false" >> "$GITHUB_OUTPUT"
            echo "matrix={\"app\":[]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          JSON_ARRAY=$(printf '%s\n' "${SELECTED[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "Apps to sync: $JSON_ARRAY"
          echo "has_apps=true" >> "$GITHUB_OUTPUT"
          echo "matrix={\"app\":$JSON_ARRAY}" >> "$GITHUB_OUTPUT"

  sync:
    needs: discover
    if: needs.discover.outputs.has_apps == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
      fail-fast: false
      max-parallel: 4
    steps:
      - uses: actions/checkout@v4

      - name: Sync ${{ matrix.app }}
        uses: nuonco/actions-nuon@v0.2.0
        with:
          org_id: ${{ needs.discover.outputs.org_id }}
          api_token: ${{ secrets.NUON_API_TOKEN }}
          command: apps sync -d ${{ matrix.app }} ${{ inputs.dry_run && '' || '--create' }}

  summary:
    needs: [discover, sync]
    if: always() && needs.discover.outputs.has_apps == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Write summary
        env:
          MATRIX: ${{ needs.discover.outputs.matrix }}
          SYNC_RESULT: ${{ needs.sync.result }}
          ORG_ID: ${{ needs.discover.outputs.org_id }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          {
            echo "## Sync All Nuon Apps"
            echo ""
            echo "- **Org:** \`$ORG_ID\`"
            echo "- **Dry run:** \`$DRY_RUN\`"
            echo "- **Sync job result:** \`$SYNC_RESULT\`"
            echo ""
            echo "### Apps"
            echo "$MATRIX" | jq -r '.app[] | "- `" + . + "`"'
          } >> "$GITHUB_STEP_SUMMARY"
