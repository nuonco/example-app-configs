# action
name    = "http_healthcheck"
timeout = "10m"
enable_kube_config = false
labels  = { service = "lambda", type = "health-check" }

[[triggers]]
type = "manual"

[[triggers]]
type           = "post-deploy-component"
component_name = "api_gateway"

[[steps]]
name = "check"
inline_contents = """
#!/usr/bin/env sh
set -e

URL="${ENDPOINT}/widgets/${WIDGET_ID}"
echo "GET ${URL}"

# Right after deploy the endpoint is often not reachable yet (DNS propagation,
# ACM cert / TLS not ready), so retry until it returns 200 or attempts run out.
: > /tmp/body.json
ATTEMPTS=12
CODE=000
i=1
while [ "${i}" -le "${ATTEMPTS}" ]; do
  CODE=$(curl -sS -m 20 -o /tmp/body.json -w '%{http_code}' "${URL}" || echo 000)
  echo "attempt ${i}/${ATTEMPTS}: http_status=${CODE}"
  [ "${CODE}" = "200" ] && break
  [ "${i}" -lt "${ATTEMPTS}" ] && sleep 15
  i=$((i + 1))
done

echo "body:"
cat /tmp/body.json
echo ""

jq -c -n \
  --arg url "${URL}" \
  --argjson code "${CODE}" \
  --slurpfile body /tmp/body.json \
  '{endpoint: $url, http_status_code: $code, body: ($body[0] // null)}' >> "${NUON_ACTIONS_OUTPUT_FILEPATH}"

if [ "${CODE}" != "200" ]; then
  echo "✗ healthcheck failed after ${ATTEMPTS} attempts"
  exit 1
fi

echo "✓ healthcheck passed"
"""

[steps.env_vars]
ENDPOINT  = "https://{{.nuon.inputs.inputs.sub_domain}}.{{.nuon.install.sandbox.outputs.nuon_dns.public_domain.name}}"
WIDGET_ID = "healthcheck"
