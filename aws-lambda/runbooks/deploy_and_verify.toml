name        = "deploy_and_verify"
description = "Deploys all components, then verifies with status check, invocation, and logs."
readme      = "./runbooks/deploy_and_verify.md"

[[steps]]
name           = "Deploy Docker image"
type           = "deploy"
component_name = "docker_image"

[[steps]]
name           = "Deploy DynamoDB table"
type           = "deploy"
component_name = "dynamodb_table"

[[steps]]
name           = "Deploy Lambda function"
type           = "deploy"
component_name = "lambda_function"

[[steps]]
name           = "Deploy certificate"
type           = "deploy"
component_name = "certificate"

[[steps]]
name           = "Deploy API Gateway"
type           = "deploy"
component_name = "api_gateway"

[[steps]]
name        = "Lambda status"
type        = "action"
action_name = "lambda_status"

[[steps]]
name        = "Invoke Lambda"
type        = "action"
action_name = "invoke_lambda"

[[steps]]
name        = "Lambda logs"
type        = "action"
action_name = "lambda_logs"
