apiVersion: v1
kind: Service
metadata:
  name: forgejo-http
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: forgejo
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: forgejo
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
