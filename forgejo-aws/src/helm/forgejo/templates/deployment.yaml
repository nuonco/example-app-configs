apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: forgejo
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: forgejo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgejo
    spec:
      serviceAccountName: forgejo
      securityContext:
        fsGroup: 1000
      containers:
        - name: forgejo
          image: {{ .Values.image | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command: ["/bin/sh", "/etc/forgejo/entrypoint.sh"]
          args: ["/usr/bin/s6-svscan", "/etc/s6"]
          env:
            - {name: DB_HOST,       valueFrom: {secretKeyRef: {name: {{ .Values.dbSecretName }},    key: host}}}
            - {name: DB_PORT,       valueFrom: {secretKeyRef: {name: {{ .Values.dbSecretName }},    key: port}}}
            - {name: DB_NAME,       valueFrom: {secretKeyRef: {name: {{ .Values.dbSecretName }},    key: database}}}
            - {name: DB_USER,       valueFrom: {secretKeyRef: {name: {{ .Values.dbSecretName }},    key: username}}}
            - {name: DB_PASSWORD,   valueFrom: {secretKeyRef: {name: {{ .Values.dbSecretName }},    key: password}}}
            - {name: CACHE_HOST,    valueFrom: {secretKeyRef: {name: {{ .Values.cacheSecretName }}, key: host}}}
            - {name: CACHE_PORT,    valueFrom: {secretKeyRef: {name: {{ .Values.cacheSecretName }}, key: port}}}
            - {name: LFS_JWT_SECRET,      valueFrom: {secretKeyRef: {name: forgejo-lfs-jwt,        key: value}}}
            - {name: SECURITY_SECRET_KEY, valueFrom: {secretKeyRef: {name: forgejo-security-key,   key: value}}}
            - {name: INTERNAL_TOKEN,      valueFrom: {secretKeyRef: {name: forgejo-internal-token, key: value}}}
            - {name: FORGEJO__service__DISABLE_REGISTRATION, value: "true"}
          ports:
            - name: http
              containerPort: 3000
            - name: ssh
              containerPort: 2222
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - {name: data,   mountPath: /data}
            - {name: config, mountPath: /etc/forgejo}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forgejo-data
        - name: config
          configMap:
            name: forgejo-config
            defaultMode: 0755
