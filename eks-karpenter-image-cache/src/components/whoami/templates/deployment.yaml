apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: {{ .Values.namespace | default .Release.Namespace | quote }}
  labels:
    app: whoami
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      nodeSelector:
        nuon.co/node-pool: cached
      tolerations:
        - key: nuon.co/node-pool
          value: cached
          effect: NoSchedule
      containers:
      - name: whoami
        image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
        imagePullPolicy: IfNotPresent
        env:
        - name: "WHOAMI_PORT_NUMBER"
          value: "{{ .Values.deployment.containerPort }}"
        ports:
        - containerPort: {{ .Values.deployment.containerPort }}
        resources:
          limits:
            cpu: ".25"
            memory: "128Mi"
          requests:
            cpu: ".1"
            memory: "64Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.deployment.containerPort }}
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.deployment.containerPort }}
          initialDelaySeconds: 5
          periodSeconds: 5
