apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: cached
spec:
  disruption:
    consolidateAfter: 300s
    consolidationPolicy: WhenEmpty
    budgets:
      - nodes: "50%"
  limits:
    cpu: "128"
    memory: 512Gi
  template:
    metadata:
      labels:
        nuon.co/node-pool: cached
    spec:
      expireAfter: 720h
      taints:
        - key: nuon.co/node-pool
          value: cached
          effect: NoSchedule
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: cached
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - m5.2xlarge
            - m5.4xlarge
            - m6i.2xlarge
            - m6i.4xlarge
