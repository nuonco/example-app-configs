type = "maintenance"
name                 = "{{ .nuon.install.id }}-maintenance"
description          = "operate and remediate the app's components and use actions."
display_name         = "maintenance role"
permissions_boundary = "./maintenance_boundary.json"

[[policies]]
managed_policy_name = "AdministratorAccess"

[[policies]]
name = "bucket-put-policy-scoped"
contents = """
{
    "Version": "2012-10-17",
    "Statement": [
        {
            "Effect": "Allow",
            "Action": "s3:PutBucketPolicy",
            "Resource": "*"
        }
    ]
}
"""

[[policies]]
name = "{{ .nuon.install.id }}-snapshot-bucket-lifecycle"
contents = """
{
    "Version": "2012-10-17",
    "Statement": [
        {
            "Sid": "ManageSnapshotBucketLifecycle",
            "Effect": "Allow",
            "Action": [
                "s3:GetBucketLifecycleConfiguration",
                "s3:PutBucketLifecycleConfiguration"
            ],
            "Resource": "arn:aws:s3:::*-nuon-dragonfly"
        }
    ]
}
"""
