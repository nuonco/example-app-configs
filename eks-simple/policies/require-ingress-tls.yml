apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-ingress-tls
  annotations:
    policies.kyverno.io/title: Require Ingress TLS
    policies.kyverno.io/category: Security
    policies.kyverno.io/subject: Ingress
    policies.kyverno.io/minversion: "1.6.0"
    kyverno.io/kyverno-version: "1.6.0"
    kyverno.io/kubernetes-version: "1.23"
    policies.kyverno.io/description: >-
      Ingress resources should use TLS to encrypt traffic and protect data in transit.
      This policy validates that all Ingress resources have TLS configuration defined
      with at least one host and secret specified.
spec:
  validationFailureAction: Enforce
  rules:
    - name: check-ingress-tls
      match:
        any:
        - resources:
            kinds:
            - networking.k8s.io/v1/Ingress
      validate:
        message: "Ingress must have TLS configuration with hosts and secretName"
        pattern:
          spec:
            tls:
            - hosts:
              - "?*"
              secretName: "?*"