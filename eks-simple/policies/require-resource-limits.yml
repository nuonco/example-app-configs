apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require Resource Limits
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: "1.6.0"
    kyverno.io/kyverno-version: "1.6.0"
    kyverno.io/kubernetes-version: "1.23"
    policies.kyverno.io/description: >-
      Pods should have resource requests and limits defined to prevent resource
      exhaustion and ensure proper scheduling. This policy validates that all
      containers have CPU and memory requests and limits specified.
spec:
  validationFailureAction: Enforce
  rules:
    - name: check-cpu-memory-limits
      match:
        any:
        - resources:
            kinds:
            - Pod
      validate:
        message: "CPU and memory resource limits and requests are required for all containers"
        pattern:
          spec:
            containers:
            - resources:
                limits:
                  memory: "?*"
                  cpu: "?*"
                requests:
                  memory: "?*"
                  cpu: "?*"