#:schema https://api.nuon.co/v1/general/config-schema?type=helm

name         = "ingress"
type         = "helm_chart"
chart_name   = "ingress"
dependencies = ["whoami"]

[connected_repo]
repo      = "nuonco/aks-simple"
directory = "src/components/ingress"
branch    = "main"

[values]
domain           = "{{.nuon.inputs.inputs.sub_domain}}.{{.nuon.install.sandbox.outputs.public_domain.name}}"
https_port       = "443"
service_name     = "whoami"
service_port     = "80"
install_name     = "{{.nuon.install.id}}"
namespace        = "whoami"
healthcheck_path = "/health"
