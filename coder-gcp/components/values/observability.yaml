global:
  coder:
    controlPlaneNamespace: coder
    externalProvisionersNamespace: coder
    coderdSelector: "pod=~`coder.*`, pod!~`.*provisioner.*`"
    provisionerdSelector: "pod=~`coder-provisioner.*`"
    workspacesSelector: "namespace=`coder`"
    logFormat: human

  postgres:
    hostname: "{{.nuon.components.cloudsql_coder.outputs.address}}"
    port: "{{.nuon.components.cloudsql_coder.outputs.db_instance_port}}"
    database: coder
    username: coder
    mountSecret: coder-db-password
    exporter:
      enabled: true
      image: "quay.io/prometheuscommunity/postgres-exporter"

  telemetry:
    metrics:
      scrape_interval: 15s
      scrape_timeout: 12s
      native_histograms: false

  alerts:
    enabled: true
    kind: "configmap"

  dashboards:
    enabled: true
    timerange: 12h
    refresh: 30s
    queryTimeout: 900

grafana-agent:
  enabled: true
  controller:
    type: daemonset

grafana:
  enabled: true
  replicas: 1
  env:
    GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: "false"
  envValueFrom:
    GF_SECURITY_ADMIN_PASSWORD:
      secretKeyRef:
        name: grafana-admin
        key: password
  readinessProbe:
    httpGet:
      path: /grafana/api/health
      port: 3000
  persistence:
    enabled: false
  # Routing to Grafana is handled by the gateway component's HTTPRoute.
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  "grafana.ini":
    server:
      domain: "{{.nuon.install.sandbox.outputs.nuon_dns.public_domain.name}}"
      root_url: "https://{{.nuon.install.sandbox.outputs.nuon_dns.public_domain.name}}/grafana"
      serve_from_sub_path: true
    security:
      password_policy: false
    "auth.anonymous":
      enabled: false
    analytics:
      reporting_enabled: false
    users:
      allow_sign_up: false

prometheus:
  enabled: true
  server:
    replicaCount: 1
    persistentVolume:
      enabled: true
      size: 20Gi
      storageClassName: standard-rwo
    retentionSize: 18GB
    retention: 15d
    resources:
      limits:
        cpu: 1000m
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 1Gi
  alertmanager:
    enabled: true
    persistentVolume:
      enabled: true
      size: 2Gi
      storageClassName: standard-rwo
  kube-state-metrics:
    enabled: true
  prometheus-node-exporter:
    enabled: true

loki:
  enabled: true
  backend:
    replicas: 1
  read:
    replicas: 1
  write:
    replicas: 1
  minio:
    enabled: true
