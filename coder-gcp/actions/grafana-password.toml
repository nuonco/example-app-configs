name               = "grafana_password"
timeout            = "1m"
enable_kube_config = false

[[triggers]]
type = "manual"

[[steps]]
name    = "Retrieve Grafana Admin Password"
command = "./get-password.sh"

[steps.public_repo]
repo      = "nuonco/example-app-configs"
directory = "coder-gcp/src/actions/grafana-password"
branch    = "main"

[steps.env_vars]
PROJECT_ID = "{{ .nuon.install_stack.outputs.project_id }}"
INSTALL_ID = "{{ .nuon.install.id }}"
