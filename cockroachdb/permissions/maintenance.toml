type                 = "maintenance"
name                 = "{{ .nuon.install.id }}-maintenance"
description          = "{{ .nuon.install.id }} maintenance role for cockroachdb install"
display_name         = "{{ .nuon.install.id }}-maintenance"
permissions_boundary = "./maintenance_boundary.json"

[[policies]] # we need to be able to gather facts about the vpc and subnets
name = "{{.nuon.install.id}}-maintenance-policy-networking"
contents = "./maintenance_policy_networking.json"

[[policies]] # it is nice to be able to trigger an install runner ASG refresh via an action
name = "{{.nuon.install.id}}-maintenance-policy-runner"
contents = "./maintenance_policy_runner.json"


[[policies]] # policies needed for sandbox and components
name = "{{.nuon.install.id}}-maintenance-policy-core"
contents = "./maintenance_policy_core.json"

[[policies]]
name = "{{.nuon.install.id}}-maintenance-policy-iam"
contents = "./maintenance_policy_iam.json"
